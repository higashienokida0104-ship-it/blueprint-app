<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#0a0800"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#c9a84c"/>
      <stop offset="40%"  style="stop-color:#f5e17a"/>
      <stop offset="60%"  style="stop-color:#e8c95d"/>
      <stop offset="100%" style="stop-color:#a07830"/>
    </linearGradient>
    <linearGradient id="innerRingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#8a6520"/>
      <stop offset="50%"  style="stop-color:#d4ac55"/>
      <stop offset="100%" style="stop-color:#8a6520"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="88" fill="url(#bgGrad)"/>

  <!-- 外側ゴールドリング -->
  <circle cx="256" cy="256" r="218" fill="none" stroke="url(#ringGrad)" stroke-width="2.5"/>

  <!-- 内側ゴールドリング -->
  <circle cx="256" cy="256" r="208" fill="none" stroke="url(#innerRingGrad)" stroke-width="0.8" stroke-dasharray="4 3"/>

  <!-- 上下の装飾ライン -->
  <line x1="196" y1="104" x2="316" y2="104" stroke="url(#ringGrad)" stroke-width="1.2"/>
  <line x1="196" y1="408" x2="316" y2="408" stroke="url(#ringGrad)" stroke-width="1.2"/>

  <!-- コーナーダイヤモンド -->
  <polygon points="256,88  262,96  256,104  250,96" fill="#d4ac55" opacity="0.9"/>
  <polygon points="256,408 262,416 256,424 250,416" fill="#d4ac55" opacity="0.9"/>

  <!-- 白抜きB（エレガントなセリフ体） -->
  <text
    x="256"
    y="375"
    font-family="Georgia, 'Palatino Linotype', 'Book Antiqua', Palatino, serif"
    font-size="340"
    font-weight="bold"
    fill="white"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-8"
  >B</text>

  <!-- B の下の細いゴールドライン（アクセント） -->
  <line x1="210" y1="388" x2="302" y2="388" stroke="url(#ringGrad)" stroke-width="1.5"/>
</svg>
